evocharge.storage=dynamodb
evocharge.seed-path=/app/data/seed
evocharge.cors-origins=${EVOCHARGE_CORS_ORIGINS:https://*.cloudfront.net,http://localhost:5173,http://localhost:5174}
evocharge.dynamodb.operators-table=${EVOCHARGE_DYNAMODB_OPERATORS_TABLE:EvoCharge-Operators}
evocharge.dynamodb.stations-table=${EVOCHARGE_DYNAMODB_STATIONS_TABLE:EvoCharge-Stations}
evocharge.bedrock.enabled=${EVOCHARGE_BEDROCK_ENABLED:true}
evocharge.bedrock.model-id=${EVOCHARGE_BEDROCK_MODEL_ID:anthropic.claude-haiku-4-5-20251001-v1:0}
evocharge.mistral.enabled=${EVOCHARGE_MISTRAL_ENABLED:true}
evocharge.mistral.api-key=${EVOCHARGE_MISTRAL_API_KEY:}
evocharge.mistral.model=${EVOCHARGE_MISTRAL_MODEL:mistral-small-latest}
evocharge.seed.resync-on-startup=${EVOCHARGE_SEED_RESYNC:false}
evocharge.pulse.interval-seconds=60
