evocharge.storage=dynamodb
evocharge.seed-path=/app/data/seed
evocharge.cors-origins=${EVOCHARGE_CORS_ORIGINS:http://localhost:5173,http://localhost:5174}
evocharge.dynamodb.operators-table=${EVOCHARGE_DYNAMODB_OPERATORS_TABLE:EvoCharge-Operators}
evocharge.dynamodb.stations-table=${EVOCHARGE_DYNAMODB_STATIONS_TABLE:EvoCharge-Stations}
evocharge.bedrock.enabled=${EVOCHARGE_BEDROCK_ENABLED:true}
evocharge.pulse.interval-seconds=60
