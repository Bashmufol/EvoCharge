spring.application.name=evocharge-api

server.port=8080

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

evocharge.storage=local
evocharge.seed-path=../../../data/seed
evocharge.cors-origins=http://localhost:5173,http://localhost:5174
evocharge.dynamodb.operators-table=EvoCharge-Operators
evocharge.dynamodb.stations-table=EvoCharge-Stations
evocharge.bedrock.model-id=anthropic.claude-3-haiku-20240307-v1:0
evocharge.bedrock.enabled=true
evocharge.pulse.interval-seconds=60
